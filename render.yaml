services:
  - type: web
    name: safedrive-api
    env: node
    plan: free
    buildCommand: pnpm install --no-frozen-lockfile && pnpm -r run build
    startCommand: pnpm --dir artifacts/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
